# This file contains common pin mappings for the BigTreeTech SKR 2.
# To use this config, the firmware should be compiled for the
# STM32F407 with a "32KiB bootloader".

# In newer versions of this board shipped in late 2021 the STM32F429
# is used, if this is the case compile for this with a "32KiB bootloader"
# You will need to check the chip on your board to identify which you have.
#
# The "make flash" command does not work on the SKR 2. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR 2
# with that SD card.

# See docs/Config_Reference.md for a description of parameters.

# Note: The initial revision of this board has a flaw that can cause
# damage to itself and other boards. Be sure to verify the board is
# not impacted by this flaw before using it.

[mcu]
baud: 250000
serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_5A0045001250324239323920-if00
restart_method: command

[temperature_sensor SKR_2]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[mcu host]
serial: /tmp/klipper_host_mcu

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 80

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PA3

[printer]
kinematics: corexy
# These are only safeguards for first time users
max_velocity: 300                        
max_accel: 1500               # Modify these values to tune acceleration.
max_accel_to_decel: 750
max_z_velocity: 15
max_z_accel: 20
square_corner_velocity: 5

[virtual_sdcard]
path: ~/gcode_files

#############################################################################################################
### BASE SETUP
#############################################################################################################

[idle_timeout]
gcode:
  {% if printer.webhooks.state|lower == 'ready' %}
    {% if printer.pause_resume.is_paused|lower == 'false' %}
      M117 Idle timeout reached
      TURN_OFF_HEATERS
      M84
    {% endif %}
  {% endif %}
# 2 hour timeout
timeout: 7200

#####################################################################
### X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: PE2
dir_pin: !PE1
enable_pin: !PE3
full_steps_per_rotation: 400
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_min: -11
position_max: 300
homing_speed: 50

[stepper_y]
step_pin: PD5
dir_pin: !PD4
enable_pin: !PD6
full_steps_per_rotation: 400
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC3
position_endstop: 0
position_min: -0.5
position_max: 300
homing_speed: 50

#####################################################################
### Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PA15
dir_pin: PA8
enable_pin: !PD1
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -3.5

[stepper_z1]
step_pin: PD11
dir_pin: PD10
enable_pin: !PD13
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop

#############################################################################################################
### TOOLHEAD
#############################################################################################################

[extruder]
step_pin: PD15
dir_pin: PD14
enable_pin: !PC7
microsteps: 16
rotation_distance: 4.5714
nozzle_diameter: 0.4
filament_diameter: 1.750
#pressure_advance: 0.05                       # Check https://www.klipper3d.org/Pressure_Advance.html for pressure advance tuning.
pressure_advance_smooth_time: 0.040           #  Default is 0.040, leave stock
heater_pin: PB3
max_power: 1.0
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA2
# control = pid
# pid_kp = 38.960
# pid_ki = 5.646
# pid_kd = 67.205
min_extrude_temp: 180
min_temp: 0
max_temp: 300


[firmware_retraction]
retract_length: 0.5
retract_speed: 60
unretract_extra_length: 0
unretract_speed: 60

# Due to BTT implementing a Marlin-specific safety feature,
# "anti-reversal stepper protection", this pin needs pulling
# high to pass power to stepper drivers and most FETs

[output_pin motor_power]
pin: PC13
value: 1

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_x]
uart_pin: PE0
run_current: 1.1
driver_TBL: 1
driver_TOFF: 3
driver_HEND: 0
driver_HSTRT: 0
interpolate: False
stealthchop_threshold: 0

[tmc2209 stepper_y]
uart_pin: PD3
run_current: 1.1
driver_TBL: 1
driver_TOFF: 3
driver_HEND: 0
driver_HSTRT: 0
interpolate: False
stealthchop_threshold: 0

[tmc2209 stepper_z]
uart_pin: PD0
run_current: 1.1
driver_TBL: 1
driver_TOFF: 3
driver_HEND: 0
driver_HSTRT: 0
interpolate: False
stealthchop_threshold: 0

[tmc2209 stepper_z1]
uart_pin: PD12
run_current: 1.1
driver_TBL: 1
driver_TOFF: 3
driver_HEND: 0
driver_HSTRT: 0
interpolate: False
stealthchop_threshold: 0

# For LDO-36STH20-1004AHG motor
[tmc2209 extruder]
uart_pin: PC6
run_current: 0.707
run_current: 0.35
driver_TBL: 1
driver_TOFF: 3
driver_HEND: 9
driver_HSTRT: 7
interpolate: False
stealthchop_threshold: 0

#############################################################################################################
### MAINS HEATED BED 
#############################################################################################################

[heater_bed]
heater_pin: PD7
sensor_type: Generic 3950
sensor_pin: PA1
max_power: 0.6
min_temp: 0
max_temp: 120
#control = pid
# pid_kp = 38.879
# pid_ki = 0.909
# pid_kd = 415.523
pwm_cycle_time: 0.0166 # 60hz for North American AC, to avoid flickering lights.

#############################################################################################################
### BED LEVELING
#############################################################################################################

# Inductive/Capacitive probe
[probe]
pin: PE4                      # For NPN NC probes such as the Super Pinda / Vinda / SupCR / Decoprobe probes.
x_offset: 0
y_offset: 32
z_offset: 0.0                 # Adjust this to fit your setup
samples: 3
sample_retract_dist: 3.0
lift_speed: 15.0
samples_result: average
samples_tolerance: 0.02
samples_tolerance_retries: 5

# Safe Z Home (Physical endstops only)
[safe_z_home]
home_xy_position: 150,150    # 300mm printer
speed: 50.0
z_hop: 15
z_hop_speed: 5

[bed_mesh]
speed: 50                     # 300 for performance mode
horizontal_move_z: 5
mesh_min: 40,40
mesh_max: 260,260
probe_count: 5,5
fade_start: 1.0
fade_end: 10.0
split_delta_z: .025
move_check_distance: 5.0
mesh_pps: 2,2
algorithm: bicubic
bicubic_tension: .2
relative_reference_index: 12

[z_tilt]
z_positions:
	-60,150
	360,150
points:
	20,150
	280,150
speed: 50
horizontal_move_z: 10
retries: 3
retry_tolerance: 0.02

#############################################################################################################
### Fans and Cooling
#############################################################################################################

[multi_pin PC_fan]
# Fan 0, 1
pins: PB7,PB6

[fan]
pin: multi_pin:PC_fan
kick_start_time: 0.5
off_below: 0.10

[heater_fan exhaust_fan]
# Fan 2
pin: PB5
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5      ##  Depending on your fan, you may need to increase this value if your fan will not start. Can change cycle_time (increase) if your fan is not able to slow down effectively
heater: heater_bed
heater_temp: 60
fan_speed: 1.0             ##  If you are experiencing back flow, you can reduce fan_speed

#[case_fan]
# Fan 3 - Always On

#[hotend_fan]
# Fan 4 - Always On

#############################################################################################################
### INPUT SHAPER
### Enable/disable input shaper calibration
#############################################################################################################
# Uncomment this next section if you have an ADXL345 connected to your control board

#[adxl345 rpi]
#cs_pin: rpi:None

#[resonance_tester]
#accel_chip: adxl345
#probe_points:
    #150,150,20             # Override this to be the center of your bed.

#[input_shaper]
#shaper_freq_x: 52.0
#shaper_type_x: mzv
#shaper_freq_y: 52.0
#shaper_type_y: mzv

#####################################################################
### LED Control
#####################################################################

[output_pin caselight]
## Chamber Lighting - HE2 Connector (Optional)
pin: PB4
pwm:true
shutdown_value: 0
value:1.0
cycle_time: 0.01

#############################################################################################################
### USER OVERRIDES
### Anything custom you want to add, or RatOS configuration you want to override, do it here.
#############################################################################################################
[skew_correction]

[force_move]
enable_force_move: True

[respond]

[include mainsail.cfg]

[include macros.cfg]

########################################
# DISPLAY
########################################

[display_status]

[display]
lcd_type: emulated_st7920
spi_software_miso_pin: EXP2_1
spi_software_mosi_pin: EXP1_3
spi_software_sclk_pin: EXP1_5
en_pin: EXP1_4
encoder_pins: ^EXP2_3, ^EXP2_5
click_pin: ^!EXP1_2

########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PC5, EXP1_3=PB1, EXP1_5=PE10, EXP1_7=PE12, EXP1_9=<GND>,
    EXP1_2=PB0, EXP1_4=PE9, EXP1_6=PE11, EXP1_8=PE13, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PA6, EXP2_3=PE7, EXP2_5=PB2, EXP2_7=PC4,   EXP2_9=<GND>,
    EXP2_2=PA5, EXP2_4=PA4, EXP2_6=PA7, EXP2_8=<RST>, EXP2_10=<NC>

# See the sample-lcd.cfg file for definitions of common LCD displays.

